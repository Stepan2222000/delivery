<!doctype html><html><head><meta charset="utf-8"/>
<title>Display Type</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;padding:20px;background:var(--cream-canvas);}
  .row{display:flex;flex-direction:column;gap:8px;}
  .row > div{display:flex;align-items:baseline;gap:14px;}
  .label{font-family:var(--font-mono);font-size:11px;color:var(--muted);width:80px;flex-shrink:0;}
  .specimen{font-family:var(--font-serif);font-weight:400;color:var(--ink);}
</style></head><body>
<div class="row">
  <div><span class="label">64 / -1.5</span><span class="specimen" style="font-size:48px;line-height:1.05;letter-spacing:-1.5px">Meet your thinking partner</span></div>
  <div><span class="label">36 / -0.5</span><span class="specimen" style="font-size:30px;line-height:1.15;letter-spacing:-0.5px">A more capable, considered AI.</span></div>
  <div><span class="label">28 / -0.3</span><span class="specimen" style="font-size:22px;line-height:1.2;letter-spacing:-0.3px">Pricing that fits your work.</span></div>
</div>
</body></html>
