<!doctype html><html><head><meta charset="utf-8"/>
<title>Buttons — Primary</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;padding:24px;background:var(--cream-canvas);font-family:var(--font-sans);}
  .row{display:flex;gap:14px;align-items:center;flex-wrap:wrap;}
  .btn{font-family:var(--font-sans);font-weight:500;font-size:14px;line-height:1;border:none;cursor:pointer;padding:12px 20px;border-radius:var(--radius-md);height:40px;display:inline-flex;align-items:center;gap:8px;}
  .primary{background:var(--brand-coral);color:#fff;box-shadow:var(--shadow-product),var(--shadow-coral-inset);border:1px solid var(--brand-coral-active);}
  .primary.active{background:var(--brand-coral-active);}
  .primary.disabled{background:var(--brand-coral-disabled);color:var(--muted);box-shadow:none;border-color:transparent;}
  .label{font-family:var(--font-mono);font-size:11px;color:var(--muted);}
</style></head><body>
<div class="row">
  <button class="btn primary">Get started</button>
  <button class="btn primary active">Get started</button>
  <button class="btn primary disabled">Get started</button>
</div>
<div class="row" style="margin-top:14px;">
  <span class="label">idle</span><span class="label" style="margin-left:74px;">active</span><span class="label" style="margin-left:60px;">disabled</span>
</div>
</body></html>
