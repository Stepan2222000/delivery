<!doctype html><html><head><meta charset="utf-8"/>
<title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;padding:20px;background:var(--cream-canvas);font-family:var(--font-sans);}
  .row{display:flex;gap:14px;align-items:flex-end;}
  .item{display:flex;flex-direction:column;gap:6px;align-items:center;font-size:11px;color:var(--muted);font-family:var(--font-mono);}
  .box{width:64px;height:64px;background:var(--brand-coral);}
</style></head><body>
<div class="row">
  <div class="item"><div class="box" style="border-radius:4px"></div>xs · 4</div>
  <div class="item"><div class="box" style="border-radius:6px"></div>sm · 6</div>
  <div class="item"><div class="box" style="border-radius:8px"></div>md · 8</div>
  <div class="item"><div class="box" style="border-radius:12px"></div>lg · 12</div>
  <div class="item"><div class="box" style="border-radius:16px"></div>xl · 16</div>
  <div class="item"><div class="box" style="border-radius:9999px"></div>pill</div>
</div>
</body></html>
