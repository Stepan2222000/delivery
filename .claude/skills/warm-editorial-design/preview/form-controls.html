<!doctype html><html><head><meta charset="utf-8"/>
<title>Form — Toggles & Checkboxes</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;padding:24px;background:var(--cream-canvas);font-family:var(--font-sans);}
  .row{display:flex;gap:32px;align-items:center;}
  .group{display:flex;flex-direction:column;gap:12px;}
  .item{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--ink);}
  /* toggle */
  .tgl{width:36px;height:20px;border-radius:9999px;position:relative;background:#404040;}
  .tgl.on{background:var(--brand-coral);}
  .tgl::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;top:3px;left:3px;}
  .tgl.on::after{left:19px;}
  /* checkbox */
  .cb{width:20px;height:20px;border-radius:4px;border:1px solid #66665f;background:#404040;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:12px;}
  .cb.on{background:#207fde;border-color:#207fde;}
  .cb.cream{background:#fff;border-color:var(--cream-hairline);}
  .cb.cream.on{background:var(--brand-coral);border-color:var(--brand-coral);}
</style></head><body>
<div class="row">
  <div class="group">
    <div class="item"><div class="tgl on"></div> Toggle ON</div>
    <div class="item"><div class="tgl"></div> Toggle OFF</div>
  </div>
  <div class="group">
    <div class="item"><div class="cb cream on">✓</div> Checked (cream)</div>
    <div class="item"><div class="cb cream"></div> Unchecked</div>
    <div class="item" style="background:var(--slate-900);padding:8px 12px;border-radius:8px;color:#fff;"><div class="cb on">✓</div> Product (dark)</div>
  </div>
</div>
</body></html>
