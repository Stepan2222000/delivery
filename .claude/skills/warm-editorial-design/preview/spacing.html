<!doctype html><html><head><meta charset="utf-8"/>
<title>Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;padding:20px;background:var(--cream-canvas);font-family:var(--font-sans);}
  .row{display:flex;flex-direction:column;gap:6px;}
  .item{display:flex;align-items:center;gap:14px;font-size:13px;color:var(--ink);}
  .bar{height:14px;background:var(--brand-coral);border-radius:3px;}
  .label{font-family:var(--font-mono);font-size:11px;color:var(--muted);width:90px;}
</style></head><body>
<div class="row">
  <div class="item"><span class="label">xxs · 4</span><div class="bar" style="width:4px"></div></div>
  <div class="item"><span class="label">xs · 8</span><div class="bar" style="width:8px"></div></div>
  <div class="item"><span class="label">sm · 12</span><div class="bar" style="width:12px"></div></div>
  <div class="item"><span class="label">md · 16</span><div class="bar" style="width:16px"></div></div>
  <div class="item"><span class="label">lg · 24</span><div class="bar" style="width:24px"></div></div>
  <div class="item"><span class="label">xl · 32</span><div class="bar" style="width:32px"></div></div>
  <div class="item"><span class="label">2xl · 48</span><div class="bar" style="width:48px"></div></div>
  <div class="item"><span class="label">section · 96</span><div class="bar" style="width:96px"></div></div>
</div>
</body></html>
