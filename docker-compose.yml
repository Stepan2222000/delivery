services:
  api:
    image: ghcr.io/stepan2222000/delivery-api:${IMAGE_TAG:-latest}
    container_name: delivery_api
    restart: unless-stopped
    ports:
      - "3301:8000"
    environment:
      DELIVERY_PG_DSN: postgresql://admin:Password123@delivery:5432/delivery
      WEB_ORIGIN: https://delivery.parts-everything.site
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: Password123
      MINIO_SECURE: "false"
      MINIO_BUCKET_PHOTOS: parts-photos
      MINIO_PHOTO_PREFIX: delivery/parcels
      MINIO_BUCKET_WAYBILLS: delivery-photos
      MINIO_PUBLIC_BASE: https://s3.parts-everything.site
      COOKIE_NAME: delivery_session
      SESSION_TTL_DAYS: "30"
    networks:
      - db_default
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  sync:
    image: ghcr.io/stepan2222000/delivery-sync:${IMAGE_TAG:-latest}
    container_name: delivery_sync
    restart: unless-stopped
    environment:
      DELIVERY_PG_DSN: postgresql://admin:Password123@delivery:5432/delivery
      SYNC_INTERVAL_MINUTES: "5"
    networks:
      - db_default
    depends_on:
      - api
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  web:
    image: ghcr.io/stepan2222000/delivery-web:${IMAGE_TAG:-latest}
    container_name: delivery_web
    restart: unless-stopped
    ports:
      - "3300:3000"
    environment:
      DELIVERY_API_URL: http://delivery_api:8000
      DELIVERY_COOKIE_NAME: delivery_session
    depends_on:
      - api
    networks:
      - db_default
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  db_default:
    external: true
