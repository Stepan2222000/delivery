<!doctype html><html><head><meta charset="utf-8"/>
<title>Icons — system</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;padding:20px;background:var(--product-bg);font-family:var(--font-sans);color:var(--on-dark-soft);}
  .grid{display:grid;grid-template-columns:repeat(8,1fr);gap:16px;align-items:center;justify-items:center;}
  .ico{display:flex;flex-direction:column;align-items:center;gap:6px;font-size:10px;font-family:var(--font-mono);color:rgba(255,255,255,0.5);}
  .ico img{width:20px;height:20px;filter:invert(1);opacity:0.85;}
  /* Lucide-style outline replacements via SVG sprite */
  svg{width:20px;height:20px;color:rgba(255,255,255,0.85);}
</style></head><body>
<div class="grid">
  <div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>chat</div>
  <div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/></svg>sidebar</div>
  <div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 1 1 3 3L7 19l-4 1 1-4Z"/></svg>new-chat</div>
  <div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>project</div>
  <div class="ico"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2 13.5 8 19 5l-3 5 6 1.5-6 1.5 3 5-5.5-3L12 22l-1.5-7L5 19l3-5-6-1.5L8 11 5 5l5.5 3z"/></svg>sparkle</div>
  <div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="9" cy="10" r="1"/><circle cx="15" cy="10" r="1"/><path d="M9 16s1 1.5 3 1.5S15 16 15 16"/></svg>character</div>
  <div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M2 6c4 0 4 12 8 12s4-12 8-12"/><path d="M2 12c4 0 4 6 8 6"/></svg>dna/styles</div>
  <div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>plus</div>
</div>
</body></html>
