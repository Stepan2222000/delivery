<!doctype html><html><head><meta charset="utf-8"/>
<title>Buttons — Secondary & Text</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;padding:24px;background:var(--cream-canvas);font-family:var(--font-sans);}
  .row{display:flex;gap:14px;align-items:center;flex-wrap:wrap;}
  .btn{font-family:var(--font-sans);font-weight:500;font-size:14px;line-height:1;cursor:pointer;padding:12px 20px;border-radius:var(--radius-md);height:40px;display:inline-flex;align-items:center;gap:8px;}
  .secondary{background:var(--cream-canvas);color:var(--ink);border:1px solid var(--cream-hairline);}
  .ghost{background:transparent;border:none;color:var(--ink);}
  .link{background:transparent;border:none;color:var(--brand-coral);text-decoration:underline;text-underline-offset:3px;font-size:16px;padding:0;}
</style></head><body>
<div class="row">
  <button class="btn secondary">Sign in</button>
  <button class="btn ghost">Learn more</button>
  <a class="btn link">Read the docs →</a>
</div>
</body></html>
