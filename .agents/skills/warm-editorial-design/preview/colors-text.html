<!doctype html><html><head><meta charset="utf-8"/>
<title>Text Tones</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;padding:20px;background:var(--cream-canvas);font-family:var(--font-sans);}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:18px 28px;}
  .item{display:flex;align-items:center;gap:12px;}
  .dot{width:28px;height:28px;border-radius:6px;border:1px solid var(--cream-hairline);flex-shrink:0;}
  .label{display:flex;flex-direction:column;}
  .name{font-weight:500;font-size:14px;color:var(--ink);}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--muted);}
</style></head><body>
<div class="row">
  <div class="item"><div class="dot" style="background:#141413"></div><div class="label"><div class="name">Ink — headlines</div><div class="hex">#141413</div></div></div>
  <div class="item"><div class="dot" style="background:#252523"></div><div class="label"><div class="name">Body strong — lead</div><div class="hex">#252523</div></div></div>
  <div class="item"><div class="dot" style="background:#3d3d3a"></div><div class="label"><div class="name">Body — paragraphs</div><div class="hex">#3D3D3A</div></div></div>
  <div class="item"><div class="dot" style="background:#6c6a64"></div><div class="label"><div class="name">Muted — sub-labels</div><div class="hex">#6C6A64</div></div></div>
  <div class="item"><div class="dot" style="background:#8e8b82"></div><div class="label"><div class="name">Muted soft — captions</div><div class="hex">#8E8B82</div></div></div>
  <div class="item"><div class="dot" style="background:#cc785c"></div><div class="label"><div class="name">Coral — inline links</div><div class="hex">#CC785C</div></div></div>
</div>
</body></html>
