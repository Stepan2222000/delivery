<!doctype html><html><head><meta charset="utf-8"/>
<title>Inline chat bubble</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;padding:18px;background:var(--product-bg);font-family:var(--font-sans);color:#fff;}
  .row{display:flex;flex-direction:column;gap:14px;max-width:560px;}
  .user{align-self:flex-end;background:#373632;color:#fff;padding:10px 14px;border-radius:14px 14px 4px 14px;font-size:14px;}
  .assistant{font-family:var(--font-serif);font-size:18px;line-height:1.45;color:#f0f0eb;}
  .assistant .me{display:flex;align-items:center;gap:8px;font-family:var(--font-sans);font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:6px;}
  .dot{width:14px;height:14px;border-radius:50%;background:#cc785c;}
</style></head><body>
<div class="row">
  <div class="user">Help me draft a release note for our new design system.</div>
  <div class="assistant"><div class="me"><div class="dot"></div>Assistant · Large model</div>Of course. A few questions first — who's the audience, and what tone do you want? "Considered and warm," or punchier and direct?</div>
</div>
</body></html>
