<!doctype html><html><head><meta charset="utf-8"/>
<title>Sans Type Stack</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;padding:20px;background:var(--cream-canvas);font-family:var(--font-sans);color:var(--ink);}
  .row{display:flex;flex-direction:column;gap:10px;}
  .row > div{display:flex;align-items:baseline;gap:14px;}
  .label{font-family:var(--font-mono);font-size:11px;color:var(--muted);width:90px;flex-shrink:0;}
  .specimen{color:var(--ink);}
</style></head><body>
<div class="row">
  <div><span class="label">title-lg 22</span><span class="specimen" style="font-size:22px;font-weight:500;line-height:1.3">Pricing plan size labels</span></div>
  <div><span class="label">title-md 18</span><span class="specimen" style="font-size:18px;font-weight:500">Feature card titles</span></div>
  <div><span class="label">body-md 16</span><span class="specimen" style="font-size:16px;line-height:1.55;color:var(--body)">Default running text reads at 16/1.55. Humanist sans, weight 400.</span></div>
  <div><span class="label">body-sm 14</span><span class="specimen" style="font-size:14px;line-height:1.55;color:var(--body)">Footer and fine-print sit at 14.</span></div>
  <div><span class="label">caption 13</span><span class="specimen" style="font-size:13px;font-weight:500;color:var(--muted)">Badge label / caption</span></div>
</div>
</body></html>
