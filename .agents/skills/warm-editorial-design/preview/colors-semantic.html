<!doctype html><html><head><meta charset="utf-8"/>
<title>Semantic Colors</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;padding:20px;background:var(--cream-canvas);}
  .row{display:flex;gap:8px;}
  .sw{flex:1;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--cream-hairline);background:#fff;}
  .chip{height:54px;}
  .meta{padding:10px 12px;}
  .name{font-family:var(--font-sans);font-weight:500;font-size:13px;color:var(--ink);}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-top:2px;}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:#5db872"></div><div class="meta"><div class="name">Success</div><div class="hex">#5DB872</div></div></div>
  <div class="sw"><div class="chip" style="background:#d4a017"></div><div class="meta"><div class="name">Warning</div><div class="hex">#D4A017</div></div></div>
  <div class="sw"><div class="chip" style="background:#bf4d43"></div><div class="meta"><div class="name">Error</div><div class="hex">#BF4D43</div></div></div>
  <div class="sw"><div class="chip" style="background:#207fde"></div><div class="meta"><div class="name">Info / Focus</div><div class="hex">#207FDE</div></div></div>
  <div class="sw"><div class="chip" style="background:#9b87f5"></div><div class="meta"><div class="name">Plan accent</div><div class="hex">#9B87F5</div></div></div>
</div>
</body></html>
