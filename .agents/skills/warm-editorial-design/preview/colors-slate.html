<!doctype html><html><head><meta charset="utf-8"/>
<title>Slate / Dark Surfaces</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;padding:20px;background:var(--cream-canvas);}
  .row{display:flex;gap:8px;}
  .sw{flex:1;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--cream-hairline);background:#fff;}
  .chip{height:64px;}
  .meta{padding:10px 12px;}
  .name{font-family:var(--font-sans);font-weight:500;font-size:13px;color:var(--ink);}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-top:2px;}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:#181715"></div><div class="meta"><div class="name">Slate 900</div><div class="hex">#181715</div></div></div>
  <div class="sw"><div class="chip" style="background:#252320"></div><div class="meta"><div class="name">Slate 800</div><div class="hex">#252320</div></div></div>
  <div class="sw"><div class="chip" style="background:#262625"></div><div class="meta"><div class="name">Product BG</div><div class="hex">#262625</div></div></div>
  <div class="sw"><div class="chip" style="background:#22211d"></div><div class="meta"><div class="name">Sidebar</div><div class="hex">#22211D</div></div></div>
</div>
</body></html>
