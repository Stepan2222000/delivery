<!doctype html><html><head><meta charset="utf-8"/>
<title>Cream Surfaces</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;padding:20px;background:#ddd6c4;}
  .row{display:flex;gap:8px;}
  .sw{flex:1;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--cream-hairline);background:#fff;}
  .chip{height:64px;}
  .meta{padding:10px 12px;}
  .name{font-family:var(--font-sans);font-weight:500;font-size:13px;color:var(--ink);}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-top:2px;}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:#faf9f5"></div><div class="meta"><div class="name">Canvas</div><div class="hex">#FAF9F5</div></div></div>
  <div class="sw"><div class="chip" style="background:#f5f0e8"></div><div class="meta"><div class="name">Soft</div><div class="hex">#F5F0E8</div></div></div>
  <div class="sw"><div class="chip" style="background:#efe9de"></div><div class="meta"><div class="name">Card</div><div class="hex">#EFE9DE</div></div></div>
  <div class="sw"><div class="chip" style="background:#e8e0d2"></div><div class="meta"><div class="name">Strong</div><div class="hex">#E8E0D2</div></div></div>
</div>
</body></html>
